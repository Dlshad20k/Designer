<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DH Designer — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080810;
  --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --text:#f0eee8;
  --text-muted:rgba(240,238,232,0.45);
  --accent:#a78bfa;
  --accent2:#7c3aed;
  --gold:#e8c97a;
  --glass-bg:rgba(15,15,28,0.75);
  --glass-border:rgba(167,139,250,0.18);
  --glow:rgba(124,58,237,0.35);
  --approve:#34d399;
  --change:#f87171;
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(124,58,237,.12) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(167,139,250,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(60,20,120,.15) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}

/* GRID BG */
.grid-bg{
position:fixed;inset:0;z-index:0;pointer-events:none;
background-image:
linear-gradient(rgba(167,139,250,0.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(167,139,250,0.03) 1px,transparent 1px);
background-size:80px 80px;
}

/* HEADER */
header{
position:sticky;top:0;z-index:100;
height:68px;padding:0 40px;
display:flex;align-items:center;justify-content:space-between;
backdrop-filter:blur(32px) saturate(1.4);
background:rgba(8,8,16,0.82);
border-bottom:1px solid var(–border);
}
.logo{
font-family:‘Bebas Neue’,sans-serif;
font-size:1.6rem;letter-spacing:.12em;
background:linear-gradient(135deg,#f0eee8,var(–accent));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-right{display:flex;align-items:center;gap:12px}
.admin-pill{
font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;
padding:6px 14px;border-radius:100px;
background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(124,58,237,.1));
border:1px solid var(–glass-border);
color:var(–accent);font-weight:500;
}
.back-btn{
font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
padding:8px 18px;border-radius:100px;
background:var(–surface);border:1px solid var(–border2);
color:var(–text-muted);cursor:pointer;
font-family:‘DM Sans’,sans-serif;font-weight:500;
transition:all .2s;text-decoration:none;
display:inline-flex;align-items:center;gap:6px;
}
.back-btn:hover{color:var(–text);border-color:rgba(255,255,255,.2)}

/* LAYOUT */
.container{
max-width:1200px;margin:0 auto;
padding:48px 40px;
position:relative;z-index:1;
}

/* PAGE HEADER */
.page-hdr{margin-bottom:48px}
.page-label{
font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;
color:var(–accent);margin-bottom:10px;
display:flex;align-items:center;gap:8px;
}
.page-label::before{content:’’;width:20px;height:1px;background:var(–accent)}
.page-title{
font-family:‘Bebas Neue’,sans-serif;
font-size:3.5rem;letter-spacing:.04em;line-height:.95;
background:linear-gradient(135deg,#fff,rgba(167,139,250,.9));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* STATS */
.stats-row{
display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
margin-bottom:40px;
}
.stat-card{
background:var(–glass-bg);
backdrop-filter:blur(32px);
border:1px solid var(–glass-border);
border-radius:20px;
padding:24px 28px;
position:relative;overflow:hidden;
box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);
transition:all .3s;
}
.stat-card:hover{
border-color:rgba(167,139,250,.3);
box-shadow:0 16px 48px rgba(0,0,0,.4),0 0 32px rgba(124,58,237,.1),inset 0 1px 0 rgba(255,255,255,.06);
}
.stat-card::before{
content:’’;position:absolute;
top:-30px;right:-30px;width:80px;height:80px;
background:radial-gradient(circle,rgba(124,58,237,.25),transparent 70%);
}
.stat-num{
font-family:‘Bebas Neue’,sans-serif;
font-size:3rem;letter-spacing:.02em;line-height:1;
background:linear-gradient(135deg,#fff,var(–accent));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
margin-bottom:4px;
}
.stat-label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(–text-muted)}

/* GLASS CARD */
.glass-card{
background:var(–glass-bg);
backdrop-filter:blur(32px);
border:1px solid var(–glass-border);
border-radius:24px;
padding:36px;
box-shadow:0 8px 40px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);
margin-bottom:24px;
position:relative;overflow:hidden;
}
.glass-card::before{
content:’’;position:absolute;
top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,rgba(167,139,250,.3),transparent);
}

/* SECTION LABEL */
.sec-label{
font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;
color:var(–accent);margin-bottom:24px;
display:flex;align-items:center;gap:8px;
}
.sec-label::before{content:’’;width:14px;height:1px;background:var(–accent)}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.form-grid.full{grid-template-columns:1fr}
.field-wrap label{
display:block;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
color:var(–text-muted);margin-bottom:8px;font-weight:500;
}
input[type=text],textarea,select{
width:100%;
background:rgba(255,255,255,0.05);
border:1px solid var(–border2);
border-radius:12px;
padding:13px 16px;
font-family:‘DM Sans’,sans-serif;font-size:.88rem;color:var(–text);
outline:none;transition:all .2s;
}
input::placeholder,textarea::placeholder{color:var(–text-muted)}
input:focus,textarea:focus,select:focus{
border-color:rgba(167,139,250,.5);
background:rgba(167,139,250,.06);
box-shadow:0 0 0 3px rgba(124,58,237,.12);
}
select option{background:#1a1830;color:var(–text)}
textarea{resize:vertical;min-height:80px}

/* DROP ZONE */
.drop-zone{
border:1.5px dashed rgba(167,139,250,.25);
border-radius:16px;padding:52px 24px;text-align:center;
cursor:pointer;position:relative;
background:rgba(124,58,237,.03);
transition:all .3s;
}
.drop-zone:hover,.drop-zone.drag-over{
border-color:rgba(167,139,250,.5);
background:rgba(124,58,237,.07);
box-shadow:0 0 32px rgba(124,58,237,.08) inset;
}
.drop-zone input[type=file]{
position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.drop-icon{
width:52px;height:52px;border-radius:50%;
background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(124,58,237,.1));
border:1px solid var(–glass-border);
display:flex;align-items:center;justify-content:center;
font-size:1.2rem;margin:0 auto 16px;
}
.drop-text{font-size:.85rem;color:var(–text-muted);line-height:1.7}
.drop-text strong{color:var(–text)}

#preview-strip{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.preview-thumb{
width:72px;height:72px;border-radius:10px;object-fit:cover;
border:1px solid var(–glass-border);
animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
.preview-doc{
width:72px;height:72px;border-radius:10px;
background:rgba(167,139,250,.08);border:1px solid var(–glass-border);
display:flex;flex-direction:column;align-items:center;justify-content:center;
font-size:.6rem;color:var(–text-muted);text-align:center;
animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}

/* BUTTONS */
.btn{
display:inline-flex;align-items:center;gap:8px;
padding:13px 26px;border-radius:100px;
font-family:‘DM Sans’,sans-serif;font-size:.8rem;font-weight:500;
cursor:pointer;border:none;letter-spacing:.08em;text-transform:uppercase;
transition:all .25s;text-decoration:none;
}
.btn-primary{
background:linear-gradient(135deg,rgba(167,139,250,.25),rgba(124,58,237,.2));
border:1px solid rgba(167,139,250,.4);color:#fff;
box-shadow:0 0 24px rgba(124,58,237,.2),inset 0 1px 0 rgba(255,255,255,.08);
}
.btn-primary:hover{
box-shadow:0 0 40px rgba(124,58,237,.35),inset 0 1px 0 rgba(255,255,255,.1);
transform:translateY(-2px);
background:linear-gradient(135deg,rgba(167,139,250,.35),rgba(124,58,237,.3));
}
.btn-ghost{
background:var(–surface);border:1px solid var(–border2);color:var(–text-muted);
}
.btn-ghost:hover{background:var(–surface2);color:var(–text)}
.btn-danger{
background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);
color:var(–change);font-size:.72rem;padding:8px 16px;
}
.btn-danger:hover{background:rgba(248,113,113,.14)}

/* PROJECTS */
.projects-hdr{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:24px;
}
.count-pill{
font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
padding:5px 14px;border-radius:100px;
background:rgba(167,139,250,.1);border:1px solid var(–glass-border);
color:var(–accent);
}

.project-item{
background:rgba(255,255,255,0.03);
border:1px solid var(–border);
border-radius:18px;padding:20px 24px;
margin-bottom:12px;
display:flex;align-items:center;gap:20px;
transition:all .3s cubic-bezier(.23,1,.32,1);
animation:slideIn .4s ease;
position:relative;overflow:hidden;
}
.project-item::before{
content:’’;position:absolute;left:0;top:0;bottom:0;width:3px;
background:linear-gradient(to bottom,var(–accent),var(–accent2));
opacity:0;transition:opacity .3s;
}
.project-item:hover{
border-color:var(–glass-border);
background:rgba(167,139,250,.04);
transform:translateX(4px);
box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.project-item:hover::before{opacity:1}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.proj-thumb{
width:56px;height:56px;border-radius:12px;
object-fit:cover;flex-shrink:0;
border:1px solid var(–glass-border);
}
.proj-thumb-ph{
width:56px;height:56px;border-radius:12px;
background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(167,139,250,.1));
border:1px solid var(–glass-border);
display:flex;align-items:center;justify-content:center;
font-size:1.4rem;flex-shrink:0;
}
.proj-info{flex:1;min-width:0}
.proj-name{
font-family:‘Syne’,sans-serif;font-size:1rem;font-weight:700;
margin-bottom:4px;letter-spacing:-.01em;
}
.proj-meta{
display:flex;align-items:center;gap:10px;flex-wrap:wrap;
font-size:.7rem;color:var(–text-muted);
}
.cat-pill{
background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.15);
padding:2px 8px;border-radius:4px;
font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(–accent);
}
.status-dot{
width:7px;height:7px;border-radius:50%;display:inline-block;
margin-right:3px;
}
.status-dot.pending{background:var(–gold)}
.status-dot.approved{background:var(–approve)}
.status-dot.changes{background:var(–change)}
.feedback-pill{
display:inline-flex;align-items:center;gap:4px;
font-size:.65rem;
background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.15);
padding:2px 10px;border-radius:100px;color:var(–change);
}
.feedback-pill.none{
background:rgba(52,211,153,.06);border-color:rgba(52,211,153,.15);
color:var(–approve);
}

.proj-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.copy-btn{
display:inline-flex;align-items:center;gap:6px;
padding:8px 16px;border-radius:100px;
font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(124,58,237,.1));
border:1px solid var(–glass-border);color:var(–accent);
cursor:pointer;transition:all .2s;font-family:‘DM Sans’,sans-serif;
}
.copy-btn:hover{
background:linear-gradient(135deg,rgba(167,139,250,.25),rgba(124,58,237,.2));
box-shadow:0 0 20px rgba(124,58,237,.2);
}
.copy-btn.copied{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.3);color:var(–approve)}

/* FEEDBACK PANEL */
.feedback-panel{
display:none;
background:rgba(255,255,255,.02);
border:1px solid var(–border);
border-radius:14px;padding:20px;margin-top:10px;
}
.feedback-panel.open{display:block;animation:slideIn .3s ease}
.fb-item{padding:12px 0;border-bottom:1px solid var(–border)}
.fb-item:last-child{border-bottom:none}
.fb-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(–text-muted);margin-bottom:4px}
.fb-text{font-size:.83rem;line-height:1.6;color:var(–text)}
.fb-time{font-size:.68rem;color:var(–text-muted);margin-top:3px}

/* EMPTY */
.empty-state{text-align:center;padding:64px 20px}
.empty-state .e-icon{
width:64px;height:64px;border-radius:50%;
background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(124,58,237,.06));
border:1px solid var(–glass-border);
display:flex;align-items:center;justify-content:center;
font-size:1.5rem;margin:0 auto 16px;
}
.empty-state p{font-size:.85rem;color:var(–text-muted);line-height:1.6}

/* TOAST */
.toast{
position:fixed;bottom:28px;right:28px;
background:linear-gradient(135deg,rgba(20,16,40,.98),rgba(15,10,30,.98));
border:1px solid var(–glass-border);
color:var(–text);padding:14px 22px;border-radius:14px;
font-size:.8rem;font-weight:500;
display:flex;align-items:center;gap:10px;
transform:translateY(80px);opacity:0;
transition:all .35s cubic-bezier(.34,1.56,.64,1);
z-index:9999;pointer-events:none;
box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 24px rgba(124,58,237,.15);
backdrop-filter:blur(20px);
}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:768px){
header{padding:0 20px}
.container{padding:28px 16px}
.form-grid{grid-template-columns:1fr}
.stats-row{grid-template-columns:1fr 1fr}
.project-item{flex-wrap:wrap}
.proj-actions{width:100%}
}
</style>

</head>

<script>
const STORAGE_KEY='dh_designer_projects';
function getProjects(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{return[]}}
function saveProjects(a){localStorage.setItem(STORAGE_KEY,JSON.stringify(a))}
function getBase(){
  const l=window.location;
  return `${l.protocol}//${l.host}${l.pathname.replace('admin.html','')}`;
}

// FILES
let files=[];
const dz=document.getElementById('drop-zone');
const fi=document.getElementById('file-input');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFiles(e.dataTransfer.files)});
fi.addEventListener('change',e=>handleFiles(e.target.files));

function handleFiles(fs){
  for(const f of fs){files.push(f);addThumb(f)}
}
function addThumb(f){
  const s=document.getElementById('preview-strip');
  if(f.type.startsWith('image/')){
    const img=document.createElement('img');
    img.className='preview-thumb';
    const r=new FileReader();r.onload=e=>img.src=e.target.result;r.readAsDataURL(f);
    s.appendChild(img);
  } else {
    const d=document.createElement('div');d.className='preview-doc';
    d.innerHTML=`<span style="font-size:1.3rem;margin-bottom:3px">📄</span>${f.name.split('.').pop().toUpperCase()}`;
    s.appendChild(d);
  }
}

// UPLOAD
function uploadProject(){
  const name=document.getElementById('proj-name').value.trim();
  if(!name){showToast('⚠ Bitte Projektname eingeben');return}
  if(!files.length){showToast('⚠ Mindestens eine Datei');return}

  const id='proj_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
  const client=document.getElementById('proj-client').value.trim();
  const category=document.getElementById('proj-category').value;
  const note=document.getElementById('proj-note').value.trim();

  Promise.all(Array.from(files).map(f=>new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>res({name:f.name,type:f.type,size:f.size,data:e.target.result});
    r.readAsDataURL(f);
  }))).then(filesData=>{
    const project={id,name,client,category,note,files:filesData,
      created:new Date().toISOString(),status:'pending',feedback:[],views:0};
    const all=getProjects();all.unshift(project);
    try{saveProjects(all)}catch{showToast('⚠ Dateien zu groß!');return}
    clearForm();renderProjects();updateStats();showToast('✦ Projekt veröffentlicht!');
  });
}

function clearForm(){
  ['proj-name','proj-client','proj-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('proj-category').selectedIndex=0;
  files=[];document.getElementById('preview-strip').innerHTML='';fi.value='';
}

// RENDER
function renderProjects(){
  const all=getProjects();
  document.getElementById('proj-count').textContent=all.length+' Projekt'+(all.length!==1?'e':'');
  const list=document.getElementById('projects-list');
  if(!all.length){
    list.innerHTML=`<div class="empty-state"><div class="e-icon">◻</div><p>Noch keine Projekte.<br>Lade dein erstes Design hoch!</p></div>`;
    return;
  }
  list.innerHTML=all.map(p=>{
    const hasFb=p.feedback?.length>0;
    const thumb=p.files.find(f=>f.type.startsWith('image/'));
    const link=`${getBase()}client.html?id=${p.id}`;
    const date=new Date(p.created).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});
    const statusLabel=p.status==='approved'?'Freigegeben':p.status==='changes'?'Änderungen':'Ausstehend';
    return `
    <div class="project-item" id="item-${p.id}">
      ${thumb?`<img class="proj-thumb" src="${thumb.data}">`:`<div class="proj-thumb-ph">🎨</div>`}
      <div class="proj-info">
        <div class="proj-name">${p.name}</div>
        <div class="proj-meta">
          ${p.client?`<span>${p.client}</span>`:''}
          <span class="cat-pill">${p.category}</span>
          <span><span class="status-dot ${p.status}"></span>${statusLabel}</span>
          <span>${date}</span>
          <span>${p.files.length} Datei${p.files.length!==1?'en':''}</span>
        </div>
        <div style="margin-top:8px">
          ${hasFb
            ?`<span class="feedback-pill">💬 ${p.feedback.length} Feedback${p.feedback.length!==1?'s':''}</span>
               <button onclick="toggleFb('${p.id}')" style="background:none;border:none;font-size:.68rem;color:var(--text-muted);cursor:pointer;margin-left:8px">Details</button>`
            :`<span class="feedback-pill none">✓ Kein Feedback</span>`}
        </div>
      </div>
      <div class="proj-actions">
        <button class="copy-btn" id="copy-${p.id}" onclick="copyLink('${p.id}','${encodeURIComponent(link)}')">🔗 Link</button>
        <button class="btn btn-danger" onclick="deleteProj('${p.id}')">✕</button>
      </div>
    </div>
    ${hasFb?`
    <div class="feedback-panel" id="fb-${p.id}">
      ${p.feedback.map(fb=>`
      <div class="fb-item">
        <div class="fb-lbl">${fb.type==='approve'?'✓ Freigabe':'✎ Änderungswunsch'}</div>
        <div class="fb-text">${fb.message||'—'}</div>
        ${fb.fileRef?`<div style="font-size:.7rem;color:var(--accent);margin-top:3px">📎 ${fb.fileRef}</div>`:''}
        <div class="fb-time">${new Date(fb.time).toLocaleString('de-DE')}</div>
      </div>`).join('')}
    </div>`:''}`;
  }).join('');
}

function toggleFb(id){document.getElementById('fb-'+id)?.classList.toggle('open')}

function copyLink(id,enc){
  navigator.clipboard.writeText(decodeURIComponent(enc)).then(()=>{
    const b=document.getElementById('copy-'+id);
    b.textContent='✓ Kopiert!';b.classList.add('copied');
    showToast('🔗 Link kopiert!');
    setTimeout(()=>{b.textContent='🔗 Link';b.classList.remove('copied')},2000);
  });
}

function deleteProj(id){
  if(!confirm('Projekt wirklich löschen?'))return;
  saveProjects(getProjects().filter(p=>p.id!==id));
  renderProjects();updateStats();showToast('✓ Gelöscht');
}

function updateStats(){
  const all=getProjects();
  document.getElementById('stat-projects').textContent=all.length;
  document.getElementById('stat-feedback').textContent=all.reduce((a,p)=>a+(p.feedback?.length||0),0);
  document.getElementById('stat-approved').textContent=all.filter(p=>p.status==='approved').length;
}

function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}

renderProjects();updateStats();
window.addEventListener('storage',()=>{renderProjects();updateStats()});
</script>

</body>
</html>
